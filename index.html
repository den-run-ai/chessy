<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Chessy — a completely offline chess PWA. Two-player or vs computer.">
  <meta name="theme-color" content="#312e2b">
  <title>Chessy — Offline Chess</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="assets/style.css?r=r23">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1 class="brand">♞ Chessy</h1>
      <div class="status" id="status" role="status" aria-live="polite">White to move</div>
    </header>

    <nav class="tabs" aria-label="App sections">
      <button type="button" class="tab" id="tabPlay" data-view="play" aria-current="page">Play</button>
      <button type="button" class="tab" id="tabReview" data-view="review">Review</button>
    </nav>

    <!-- Shown only OUTSIDE Play while a timed game's clocks are running:
         the live game must stay visible from the coach views (#34). -->
    <button type="button" id="liveGameNote" class="live-note" hidden></button>

    <!-- Archive failures with no dialog to report into (boot-time work,
         late-settling writes after the dialog closed): OUTSIDE the view
         containers, so switching to a coach view cannot hide the warning
         that a game was not stored. -->
    <div class="offline-note" id="archiveBootNote" role="status" hidden></div>

    <!-- ONE persistent main landmark wraps every switchable view: hiding
         Play while a coach view is active must not leave the page without
         a main landmark for screen-reader landmark navigation. -->
    <main>
    <div class="layout view" id="viewPlay">
      <section class="board-wrap">
        <div class="board" id="board" role="grid" aria-label="Chess board"></div>
      </section>

      <aside class="panel">
        <div class="controls">
          <div class="setup-summary" id="setupSummary" aria-live="polite"></div>
          <div class="buttons">
            <button id="newGame" class="btn primary">New game</button>
            <button id="undo" class="btn">Undo</button>
            <button id="flip" class="btn">Flip board</button>
          </div>
          <div class="buttons">
            <button id="exportPgn" class="btn">Save PGN</button>
            <button id="exportPgnLog" class="btn">Save PGN + log</button>
          </div>
        </div>

        <div class="clocks" id="clocks" hidden>
          <div class="clock" id="clockWhite" aria-label="White clock"><span>White</span><b>--:--</b></div>
          <div class="clock" id="clockBlack" aria-label="Black clock"><span>Black</span><b>--:--</b></div>
        </div>
        <div class="captured" id="capturedByWhite" aria-label="Pieces captured by White"></div>
        <div class="buttons replay-nav" role="group" aria-label="Replay navigation">
          <button id="replayStart" class="btn" aria-label="Go to start position" title="Start position (Home)">⏮</button>
          <button id="replayBack" class="btn" aria-label="Previous move" title="Previous move (←)">◀</button>
          <button id="replayFwd" class="btn" aria-label="Next move" title="Next move (→)">▶</button>
          <button id="replayLive" class="btn" aria-label="Go to latest position" title="Latest position (End)">⏭</button>
        </div>
        <ol class="moves" id="moveList" aria-label="Move list"></ol>
        <div class="captured" id="capturedByBlack" aria-label="Pieces captured by Black"></div>

        <div class="offline-note" id="installNote" role="status">Preparing offline mode…</div>
      </aside>
    </div>

    <!-- Review: READ-ONLY browsing of archived games. Reflection and
         lesson cards build on this in the next slice. -->
    <section class="view coach" id="viewReview" hidden aria-labelledby="reviewTitle">
      <div class="view-head">
        <h2 id="reviewTitle">Review</h2>
      </div>
      <div id="gameListWrap">
        <p class="coach-note" id="reviewEmpty" hidden>No games archived yet — finish a game in Play.</p>
        <ol class="game-list" id="gameList" aria-label="Archived games"></ol>
      </div>

      <div id="reviewFlow" hidden>
        <button type="button" id="reviewBack" class="btn">← All games</button>
        <div class="coach-board-row">
          <div class="coach-board-wrap">
            <div class="board small" id="reviewBoard" aria-label="Review board"></div>
            <div class="buttons review-nav">
              <button type="button" id="revStart" class="btn" aria-label="Go to start position">⏮</button>
              <button type="button" id="revPrev" class="btn" aria-label="Previous move">◀</button>
              <button type="button" id="revNext" class="btn" aria-label="Next move">▶</button>
              <button type="button" id="revEnd" class="btn" aria-label="Go to final position">⏭</button>
            </div>
            <p class="coach-note" id="reviewStatus" aria-live="polite"></p>
            <button type="button" id="flagMoment" class="btn primary">Flag this moment</button>
          </div>

          <div class="coach-side">
            <!-- Engine output stays hidden until the player has answered. -->
            <form id="reflectForm" class="coach-form" hidden>
              <h3>Before the engine speaks…</h3>
              <label>What is the opponent threatening?
                <input type="text" id="reflectThreat" autocomplete="off" required></label>
              <label>Which candidate moves did you consider?
                <input type="text" id="reflectCandidates" autocomplete="off" required
                       placeholder="e.g. Nf3, d4, O-O"></label>
              <label>Your evaluation here:
                <select id="reflectEval" required>
                  <option value="" selected disabled>Choose…</option>
                  <option value="winning">I'm winning</option>
                  <option value="better">I'm better</option>
                  <option value="equal">Equal</option>
                  <option value="worse">I'm worse</option>
                  <option value="lost">I'm lost</option>
                </select></label>
              <button type="submit" id="reflectVerify" class="btn primary">Ask Chessy (one probe)</button>
            </form>

            <div id="verifyBox" class="coach-form" hidden>
              <h3>Chessy’s line</h3>
              <p id="verifyResult" aria-live="polite"></p>
              <label id="causeLabel">Cause (your call — the engine only offered one line):
                <select id="cardCause">
                  <option value="" selected disabled>Your call…</option>
                  <option value="threat-scan">Missed a threat</option>
                  <option value="candidates">Good move not among my candidates</option>
                  <option value="evaluation">Considered it but judged it wrong</option>
                  <option value="calculation">Line went wrong on the reply</option>
                  <option value="efficiency">Right idea, too much time</option>
                  <option value="impulse">Moved too fast</option>
                  <option value="sound-alternative">My move was also sound</option>
                </select></label>
              <label>Lesson (one reusable sentence):
                <input type="text" id="cardLesson" autocomplete="off"
                       placeholder="e.g. Check every check before recapturing"></label>
              <button type="button" id="saveCard" class="btn primary">Save lesson card</button>
              <p class="coach-note" id="cardSaved" aria-live="polite" hidden></p>
            </div>
          </div>
        </div>
      </div>
    </section>
    </main>
  </div>

  <!-- Setup uses styled radio groups, NOT native selects: mobile browsers
       render select menus as system popovers that can cover the browser
       chrome and look detached from the dialog. -->
  <dialog id="newGameDialog" class="setup" aria-labelledby="newGameTitle">
    <h2 id="newGameTitle">New game</h2>
    <fieldset class="choice stack">
      <legend>Opponent</legend>
      <div class="choice-options">
        <label><input type="radio" name="mode" value="pvp"><span>Two players</span></label>
        <label><input type="radio" name="mode" value="ai-b" checked><span>White vs computer</span></label>
        <label><input type="radio" name="mode" value="ai-w"><span>Black vs computer</span></label>
      </div>
    </fieldset>
    <fieldset class="choice">
      <legend>Difficulty</legend>
      <div class="choice-options">
        <label><input type="radio" name="difficulty" value="1"><span>Easy</span></label>
        <label><input type="radio" name="difficulty" value="2" checked><span>Medium</span></label>
        <label><input type="radio" name="difficulty" value="3"><span>Hard</span></label>
        <label><input type="radio" name="difficulty" value="5"><span>Expert</span></label>
        <label><input type="radio" name="difficulty" value="master"><span>Master</span></label>
      </div>
    </fieldset>
    <fieldset class="choice">
      <legend>Time control</legend>
      <div class="choice-options">
        <label><input type="radio" name="timeControl" value="none" checked><span>No clocks</span></label>
        <label><input type="radio" name="timeControl" value="300+3"><span>5+3</span></label>
        <label><input type="radio" name="timeControl" value="900+10"><span>15+10</span></label>
        <label><input type="radio" name="timeControl" value="1800+20"><span>30+20</span></label>
      </div>
    </fieldset>
    <div class="buttons setup-actions">
      <button id="newGameStart" class="btn primary">Start game</button>
      <button id="newGameCancel" class="btn">Cancel</button>
    </div>
  </dialog>

  <dialog id="promotionDialog" class="promotion" aria-label="Choose promotion piece">
    <div class="promotion-choices" id="promotionChoices"></div>
  </dialog>

  <dialog id="gameOverDialog" class="gameover" aria-labelledby="gameOverTitle"
          aria-describedby="gameOverDetail">
    <h2 id="gameOverTitle"></h2>
    <p id="gameOverDetail"></p>
    <!-- Shown only when the coaching-archive write FAILED (assets/app.js). -->
    <p class="offline-note" id="archiveNote" role="status" hidden></p>
    <div class="buttons gameover-actions">
      <button id="gameOverReview" class="btn primary">Review game</button>
      <button id="gameOverRematch" class="btn">Rematch</button>
      <button id="gameOverClose" class="btn">Close</button>
    </div>
  </dialog>

  <!-- Release-unit loading (#37): every executable asset carries this
       release token in its URL, and the service worker caches each release's
       assets under distinct keys. HTML therefore always executes with the
       scripts of ITS OWN release — online they come from the network, offline
       the cached shell requests the cached same-release assets — never a mix
       of old cached scripts under new HTML. The token below, the ?r= on each
       tag, and RELEASE in sw.js must agree; test/browser/sw-update.test.js
       fails the build if they drift. -->
  <script>window.CHESSY_RELEASE = 'r23';</script>
  <script src="assets/engine.js?r=r23"></script>
  <script src="assets/ai.js?r=r23"></script>
  <!-- store.js and archive.js load BEFORE app.js: by the time the app
       boots (starting a restored game's clock and AI), archive support has
       either definitively loaded or definitively failed — a restored timer
       expiring can never race a still-loading archive module into a false
       "storage unavailable" verdict. -->
  <script src="assets/store.js?r=r23"></script>
  <script src="assets/archive.js?r=r23"></script>
  <script src="assets/app.js?r=r23"></script>
  <script src="assets/mini-board.js?r=r23"></script>
  <script src="assets/review.js?r=r23"></script>
  <script src="assets/analysis.js?r=r23"></script>
  <script src="assets/reflection.js?r=r23"></script>
  <script>
    // Offline status: show the actual service-worker state instead of an
    // unconditional "fully offline" claim.
    (function () {
      var note = document.getElementById('installNote');
      function setNote(text) { note.textContent = text; }

      if (!('serviceWorker' in navigator)) {
        setNote('Offline mode not supported here — the game still works online.');
        return;
      }
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').then(function (reg) {
          if (navigator.serviceWorker.controller) {
            setNote('Ready offline — installable as an app.');
          } else if (reg.installing) {
            setNote('Caching for offline use…');
          }
          function watch(sw, firstInstall) {
            if (!sw) return;
            sw.addEventListener('statechange', function () {
              if (sw.state === 'installed') {
                setNote(firstInstall ? 'Ready offline — installable as an app.'
                                     : 'Updating to the latest version…');
              } else if (sw.state === 'redundant' && !navigator.serviceWorker.controller) {
                setNote('Offline setup failed — playing online only.');
              }
            });
          }
          watch(reg.installing, !navigator.serviceWorker.controller);
          reg.addEventListener('updatefound', function () {
            watch(reg.installing, !navigator.serviceWorker.controller);
          });
          // Re-check for updates whenever the app is brought back into view
          // (helps installed/home-screen PWAs that keep running).
          document.addEventListener('visibilitychange', function () {
            if (document.visibilityState === 'visible') reg.update();
          });
        }).catch(function () {
          setNote('Offline setup failed — playing online only.');
        });
        // When an updated service worker takes control, reload once so the
        // new version applies immediately (game state is in localStorage).
        var hadController = !!navigator.serviceWorker.controller;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (hadController) location.reload();
          hadController = true;
        });
      });
    })();
  </script>
</body>
</html>
