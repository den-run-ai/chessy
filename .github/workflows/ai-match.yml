name: AI self-play match

# TEMPORARY preserve variant: downloads the 20 shard artifacts from the
# finished 800-game run and commits them verbatim into the repo so the raw
# records survive the artifact-retention expiry. Restored to the matrix match
# workflow immediately after.
on:
  workflow_dispatch:
    inputs:
      base:
        description: unused
        default: origin/main
        required: true
      nodes:
        description: unused
        default: "10000"
        required: true

permissions:
  contents: write
  actions: read

jobs:
  preserve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/ai-4-lmr
      - uses: actions/download-artifact@v4
        with:
          run-id: 29872388552
          github-token: ${{ github.token }}
          pattern: match-results-*
          path: results/lmr-800game-run29872388552
          merge-multiple: true
      - name: Commit the raw records
        run: |
          set -euo pipefail
          ls -1 results/lmr-800game-run29872388552
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/lmr-800game-run29872388552
          git commit -m "Preserve raw 800-game LMR match records (run 29872388552) before artifact expiry"
          git push origin HEAD:claude/ai-4-lmr
