name: AI self-play match

# TEMPORARY aggregate-only variant: pulls the 20 shard artifacts from the
# already-finished 800-game run and prints the opening-clustered verdict, so the
# result can be collected without scraping 20 job logs. Restored to the matrix
# match workflow immediately after.
on:
  workflow_dispatch:
    inputs:
      base:
        description: unused
        default: origin/main
        required: true
      nodes:
        description: unused
        default: "10000"
        required: true

permissions:
  contents: read
  actions: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          run-id: 29872388552
          github-token: ${{ github.token }}
          pattern: match-results-*
          path: shards
          merge-multiple: true
      - name: Aggregate the 20 shards into the clustered verdict
        run: |
          echo "shard files:"; ls -1 shards
          node test/ai-match-agg.js shards/match-results-*.txt
